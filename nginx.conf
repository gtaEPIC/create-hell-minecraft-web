server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    index index.html;

    # Serve static files
    location / {
        try_files $uri /index.html;
    }

    # Optional: Serve 404 for files not found
    error_page 404 /index.html;

    # Cache control for static files (optional)
    location ~* \.(?:ico|css|js|woff|woff2|ttf|svg|png|jpg|jpeg|gif|webp|avif|json|txt|xml|wasm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
