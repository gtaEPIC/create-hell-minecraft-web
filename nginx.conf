server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    index index.html;

    # Serve static files for your main site
    location / {
        try_files $uri /index.html;
    }

    # Match /map and everything under it
    location /map {
        # Remove /map prefix and pass the rest to backend
        rewrite ^/map/(.*) /$1 break;
        rewrite ^/map$ / break;

        proxy_pass http://mc:8123;

        # WebSocket support for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix redirects from backend
        proxy_redirect / /map/;

        # Rewrite asset paths in HTML/JS
        sub_filter 'src="/' 'src="/map/';
        sub_filter 'href="/' 'href="/map/';
        sub_filter "src='/" "src='/map/";
        sub_filter "href='/" "href='/map/";
        sub_filter_once off;
        sub_filter_types *;
    }

    # Optional: Serve 404 for files not found
    error_page 404 /index.html;

    # Cache control for static files (optional)
    location ~* \.(?:ico|css|js|woff|woff2|ttf|svg|png|jpg|jpeg|gif|webp|avif|json|txt|xml|wasm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}